name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15-intel  # Intel (x86_64)
            arch: x86_64
            label: Intel
          - os: macos-latest   # Silicon (arm64)
            arch: arm64
            label: M-Chip
    runs-on: ${{ matrix.os }}
    name: Build macOS (${{ matrix.arch }})
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install FFmpeg
        run: brew install ffmpeg

      - name: Import macOS Certificates (Safe Mode)
        shell: python
        env:
          CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE }}
          CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          import base64, os, subprocess
          cert_data = os.environ['CERTIFICATE_P12_BASE64']
          if not cert_data:
              print("ERROR: MACOS_CERTIFICATE is empty!")
              exit(1)
          with open('certificate.p12', 'wb') as f:
              f.write(base64.b64decode(cert_data))
          cert_pwd = os.environ['CERTIFICATE_PASSWORD']
          commands = [
              'security create-keychain -p "" build.keychain',
              'security default-keychain -s build.keychain',
              'security unlock-keychain -p "" build.keychain',
              f'security import certificate.p12 -k build.keychain -P "{cert_pwd}" -T /usr/bin/codesign',
              'security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain'
          ]
          for cmd in commands:
              subprocess.run(cmd, shell=True, check=True)

      - name: Build with PyInstaller
        run: |
          pyinstaller --clean --noconfirm YouTubeDownloader.spec

      - name: Code Sign and Notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          APP_PATH="dist/YouTubeDownloader.app"
          codesign --force --options runtime --deep --sign "Developer ID Application" --entitlements entitlements.plist --timestamp "$APP_PATH"
          ditto -c -k --keepParent "$APP_PATH" dist/YouTubeDownloader.zip
          xcrun notarytool submit dist/YouTubeDownloader.zip --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_PASSWORD" --wait
          xcrun stapler staple "$APP_PATH"

      - name: Create DMG
        run: |
          hdiutil create -volname "YouTubeDownloader" -srcfolder dist/YouTubeDownloader.app -ov -format UDZO "dist/YB-Mac-${{ matrix.label }}.dmg"

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: YB-Mac-${{ matrix.label }}
          path: dist/YB-Mac-${{ matrix.label }}.dmg

  build-windows:
    runs-on: windows-latest
    name: Build Windows (x64)
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --clean --noconfirm YouTubeDownloader.spec

      - name: Download FFmpeg for Windows
        run: |
          curl -L https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip -o ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath .
          if (!(Test-Path "dist/YouTubeDownloader")) { New-Item -ItemType Directory -Force -Path "dist/YouTubeDownloader" }
          Copy-Item ffmpeg-master-latest-win64-gpl/bin/ffmpeg.exe dist/YouTubeDownloader/ffmpeg.exe -Force
          Copy-Item ffmpeg-master-latest-win64-gpl/bin/ffprobe.exe dist/YouTubeDownloader/ffprobe.exe -Force

      - name: Zip Windows Release
        run: |
          Compress-Archive -Path dist/YouTubeDownloader/* -DestinationPath dist/YB-Windows10_11-64bit.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: YB-Windows10_11-64bit
          path: dist/YB-Windows10_11-64bit.zip

  create-release:
    needs: [build-macos, build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## v1.2.5 업데이트

            ### 중복 실행 방지
            - Windows에서 .exe를 여러 번 클릭해도 인스턴스가 하나만 실행됨
            - 포트 체크(크로스 플랫폼) + Named Mutex(Windows) 이중 방지
            - macOS에서도 터미널 중복 실행 시 자동 종료

            ### 2영상 병렬 다운로드
            - 최대 2개 영상을 동시에 다운로드하여 속도 향상
            - yt-dlp 프로세스 로그 캡처 개선

            ### 커맨드 정비
            - 슬래시 커맨드 파일명에 c- 접두사 추가하여 구분 용이
          files: |
            YB-Mac-Intel/YB-Mac-Intel.dmg
            YB-Mac-M-Chip/YB-Mac-M-Chip.dmg
            YB-Windows10_11-64bit/YB-Windows10_11-64bit.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

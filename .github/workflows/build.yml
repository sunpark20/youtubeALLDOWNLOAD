name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15-intel  # Intel (x86_64)
            arch: x86_64
          - os: macos-latest   # Silicon (arm64)
            arch: arm64
    runs-on: ${{ matrix.os }}
    name: Build macOS (${{ matrix.arch }})
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install FFmpeg
        run: brew install ffmpeg

      - name: Import macOS Certificates (Safe Mode)
        shell: python
        env:
          CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE }}
          CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          import base64, os, subprocess
          cert_data = os.environ['CERTIFICATE_P12_BASE64']
          if not cert_data:
              print("ERROR: MACOS_CERTIFICATE is empty!")
              exit(1)
          with open('certificate.p12', 'wb') as f:
              f.write(base64.b64decode(cert_data))
          cert_pwd = os.environ['CERTIFICATE_PASSWORD']
          commands = [
              'security create-keychain -p "" build.keychain',
              'security default-keychain -s build.keychain',
              'security unlock-keychain -p "" build.keychain',
              f'security import certificate.p12 -k build.keychain -P "{cert_pwd}" -T /usr/bin/codesign',
              'security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain'
          ]
          for cmd in commands:
              subprocess.run(cmd, shell=True, check=True)

      - name: Build with PyInstaller
        run: |
          pyinstaller --clean --noconfirm YouTubeDownloader.spec

      - name: Code Sign and Notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          APP_PATH="dist/YouTubeDownloader.app"
          codesign --force --options runtime --deep --sign "Developer ID Application" --entitlements entitlements.plist --timestamp "$APP_PATH"
          ditto -c -k --keepParent "$APP_PATH" dist/YouTubeDownloader.zip
          xcrun notarytool submit dist/YouTubeDownloader.zip --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_PASSWORD" --wait
          xcrun stapler staple "$APP_PATH"

      - name: Create DMG
        run: |
          hdiutil create -volname "YouTubeDownloader" -srcfolder dist/YouTubeDownloader.app -ov -format UDZO dist/YouTubeDownloader-macOS-${{ matrix.arch }}.dmg

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: YouTubeDownloader-macOS-${{ matrix.arch }}
          path: dist/YouTubeDownloader-macOS-${{ matrix.arch }}.dmg

  build-windows:
    runs-on: windows-latest
    name: Build Windows (x64)
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --clean --noconfirm YouTubeDownloader.spec

      - name: Download FFmpeg for Windows
        run: |
          curl -L https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip -o ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath .
          if (!(Test-Path "dist/YouTubeDownloader")) { New-Item -ItemType Directory -Force -Path "dist/YouTubeDownloader" }
          Copy-Item ffmpeg-master-latest-win64-gpl/bin/ffmpeg.exe dist/YouTubeDownloader/ffmpeg.exe -Force
          Copy-Item ffmpeg-master-latest-win64-gpl/bin/ffprobe.exe dist/YouTubeDownloader/ffprobe.exe -Force

      - name: Zip Windows Release
        run: |
          Compress-Archive -Path dist/YouTubeDownloader/* -DestinationPath dist/YouTubeDownloader-Windows.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: YouTubeDownloader-Windows
          path: dist/YouTubeDownloader-Windows.zip

  create-release:
    needs: [build-macos, build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          body: |
            ## v1.1.9 업데이트

            ### 디자인 변경
            - 영상 목록에 체크박스 아이콘 추가
            - 받기 버튼 선택 개수 표시 (`받기 (N개)`)
            - 전체선택 / 개별선택 체크박스 UI

            ### 키보드 컨트롤 추가
            - URL 입력 → `Enter` → 형식 선택 → `Enter` → 분석 → `Enter`로 다운로드까지 키보드만으로 완료 가능
            - 영상 목록에서 `↑↓ 방향키`로 항목 이동, `Space`로 선택/해제, `Enter`로 바로 다운로드
            - `Cmd+↑↓` (Mac) / `Ctrl+↑↓` (Windows)로 목록 맨 위/아래 이동
            - 전체선택 체크박스로 일괄 선택/해제

            ### 선택 다운로드
            - 원하는 영상만 골라서 다운로드 가능 (기존: 전체 다운로드만 가능)
            - 선택 없으면 받기 버튼 비활성화
          files: |
            YouTubeDownloader-macOS-x86_64/YouTubeDownloader-macOS-x86_64.dmg
            YouTubeDownloader-macOS-arm64/YouTubeDownloader-macOS-arm64.dmg
            YouTubeDownloader-Windows/YouTubeDownloader-Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

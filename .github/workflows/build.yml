name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15-intel  # Intel (x86_64)
            arch: x86_64
            label: Intel
          - os: macos-latest   # Silicon (arm64)
            arch: arm64
            label: MChip
    runs-on: ${{ matrix.os }}
    name: Build macOS (${{ matrix.arch }})
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install FFmpeg
        run: brew install ffmpeg

      - name: Import macOS Certificates (Safe Mode)
        shell: python
        env:
          CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE }}
          CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          import base64, os, subprocess
          cert_data = os.environ['CERTIFICATE_P12_BASE64']
          if not cert_data:
              print("ERROR: MACOS_CERTIFICATE is empty!")
              exit(1)
          with open('certificate.p12', 'wb') as f:
              f.write(base64.b64decode(cert_data))
          cert_pwd = os.environ['CERTIFICATE_PASSWORD']
          commands = [
              'security create-keychain -p "" build.keychain',
              'security default-keychain -s build.keychain',
              'security unlock-keychain -p "" build.keychain',
              f'security import certificate.p12 -k build.keychain -P "{cert_pwd}" -T /usr/bin/codesign',
              'security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain'
          ]
          for cmd in commands:
              subprocess.run(cmd, shell=True, check=True)

      - name: Build with PyInstaller
        run: |
          pyinstaller --clean --noconfirm YT-Chita.spec

      - name: Code Sign and Notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          APP_PATH="dist/YT-Chita.app"
          codesign --force --options runtime --deep --sign "Developer ID Application" --entitlements entitlements.plist --timestamp "$APP_PATH"
          ditto -c -k --keepParent "$APP_PATH" dist/YT-Chita.zip
          xcrun notarytool submit dist/YT-Chita.zip --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_PASSWORD" --wait
          xcrun stapler staple "$APP_PATH"

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          create-dmg \
            --volname "YT-Chita" \
            --volicon "resource/icon.icns" \
            --background "resource/dmg-background.png" \
            --window-pos 200 120 \
            --window-size 660 400 \
            --icon-size 80 \
            --icon "YT-Chita.app" 180 190 \
            --app-drop-link 480 190 \
            --hide-extension "YT-Chita.app" \
            --no-internet-enable \
            "dist/YTChita-Mac-${{ matrix.label }}.dmg" \
            "dist/YT-Chita.app"

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: YTChita-Mac-${{ matrix.label }}
          path: dist/YTChita-Mac-${{ matrix.label }}.dmg

  build-windows:
    runs-on: windows-latest
    name: Build Windows (x64)
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --clean --noconfirm YT-Chita.spec

      - name: Download FFmpeg for Windows
        run: |
          curl -L https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip -o ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath .
          if (!(Test-Path "dist/YT-Chita")) { New-Item -ItemType Directory -Force -Path "dist/YT-Chita" }
          Copy-Item ffmpeg-master-latest-win64-gpl/bin/ffmpeg.exe dist/YT-Chita/ffmpeg.exe -Force
          Copy-Item ffmpeg-master-latest-win64-gpl/bin/ffprobe.exe dist/YT-Chita/ffprobe.exe -Force

      - name: Zip Windows Release
        run: |
          Compress-Archive -Path dist/YT-Chita/* -DestinationPath dist/YTChita-Windows10_11-64bit.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: YTChita-Windows10_11-64bit
          path: dist/YTChita-Windows10_11-64bit.zip

  create-release:
    needs: [build-macos, build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## v1.2.8

            ### Windows: Silent Crash Fix
            - Windows에서 앱 실행 시 무반응/무음 크래시 문제 수정
            - 에러 발생 시 Windows MessageBox로 원인 표시 + 로그 경로 안내
            - 서버 시작 실패, WebView 로드 실패, 포트 충돌 등 모든 시작 오류 가시화

            ### Auto Port Recovery
            - 포트 8000 충돌 시 자동으로 다음 포트(8001~8009) 탐색 후 실행
            - 중복 인스턴스 감지를 health endpoint 기반으로 개선 (다른 앱 오판 방지)

            ### Max Videos Increased
            - 채널/플레이리스트 최대 분석 영상 수 500 → 2000으로 확대
          files: |
            YTChita-Mac-Intel/YTChita-Mac-Intel.dmg
            YTChita-Mac-MChip/YTChita-Mac-MChip.dmg
            YTChita-Windows10_11-64bit/YTChita-Windows10_11-64bit.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
